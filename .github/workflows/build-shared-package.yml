name: Build Shared Package

on:
  workflow_call:
    inputs:
      directory:
        description: Docker build context directory
        required: false
        type: string
        default: .
      image:
        description: Full image name including registry/repository
        required: true
        type: string
      push:
        description: Whether to push the built image
        required: true
        type: boolean
      target:
        description: Docker build target stage
        required: true
        type: string
    secrets:
      HARBOR_REGISTRY_PASSWORD:
        required: true

env:
  REGISTRY: harbor.bratislava.sk
  REGISTRY_USERNAME: robot$github_actions

jobs:
  build:
    name: Build
    runs-on: bratislava
    steps:
      - name: Resolve commit
        id: commit
        shell: bash
        run: |
          echo "tag=${{ inputs.image }}:build-${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ secrets.HARBOR_REGISTRY_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.directory }}
          target: ${{ inputs.target }}
          push: ${{ inputs.push }}
          tags: ${{ steps.commit.outputs.tag }}
          cache-from: type=registry,ref=${{ inputs.image }}:cache
          cache-to: type=registry,ref=${{ inputs.image }}:cache,mode=max

      - name: Print summary
        shell: bash
        run: |
          echo "### Build Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: \`${{ steps.commit.outputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Pushed: \`${{ inputs.push }}\`" >> "$GITHUB_STEP_SUMMARY"

name: Build Nest
on:
  workflow_call:
    inputs:
      directory:
        description: "Base dir where whole app is located."
        type: string
        required: true
      image:
        description: "Full image name including registry/repository for Docker cache."
        type: string
        required: true
      forms_shared_digest:
        description: "Immutable forms-shared image digest used during Docker build."
        type: string
        required: false
        default: ""
      openapi_clients_digest:
        description: "Immutable openapi-clients image digest used during Docker build."
        type: string
        required: false
        default: ""
      target_validate:
        description: "Docker target used for validation image build."
        type: string
        required: true
      target_build:
        description: "Docker target used for final image build."
        type: string
        required: true
      target_unit_test:
        description: "Docker target used for unit test image build."
        type: string
        required: true
      target_lint:
        description: "Docker target used for lint image build."
        type: string
        required: true
      target_e2e_test:
        description: "Docker target used for E2E test image build."
        type: string
        required: false
        default: ""
    secrets:
      DOCKER_REGISTRY_USERNAME:
        required: true
      DOCKER_REGISTRY_PASSWORD:
        required: true
      HARBOR_REGISTRY_PASSWORD:
        required: true

permissions:
  contents: read

env:
  REGISTRY: harbor.bratislava.sk
  REGISTRY_USERNAME: robot$github_actions

jobs:
  test:
    name: Build Nest
    runs-on: "bratislava"
    env:
      POSTGRES_DB: forms
      POSTGRES_USER: forms
      POSTGRES_PASSWORD: password
      POSTGRES_HOST: localhost
    services:
      postgres:
        # GitHub Actions does not support `if:` on services, so use an empty image
        # to disable the service when E2E tests are not running.
        image: ${{ inputs.target_e2e_test != '' && 'postgres:16-alpine' || '' }}
        env:
          POSTGRES_DB: forms
          POSTGRES_USER: forms
          POSTGRES_PASSWORD: password
        ports:
          - 5432/tcp
        options: >-
          --health-cmd "pg_isready -U forms -d forms"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 15
    defaults:
      run:
        working-directory: ${{ inputs.directory }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Resolve cache refs
        id: cache_ref
        uses: ./.github/actions/resolve-cache-refs
        with:
          image: ${{ inputs.image }}
          suffixes: |
            validate
            test
            lint
            e2e-test
            build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # The docker-container driver does not support resolving `host-gateway`
          # for `--add-host`, so use the host network and reach the GitHub service
          # container through its published localhost port during the E2E build.
          driver-opts: |
            network=host

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ secrets.HARBOR_REGISTRY_PASSWORD }}

      - name: Build validation image
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.directory }}
          target: ${{ inputs.target_validate }}
          cache-from: ${{ fromJSON(steps.cache_ref.outputs.cache_refs).validate.cache_from }}
          cache-to: ${{ fromJSON(steps.cache_ref.outputs.cache_refs).validate.cache_to }}
          build-args: |
            FORMS_SHARED_DIGEST=${{ inputs.forms_shared_digest }}
            OPENAPI_CLIENTS_DIGEST=${{ inputs.openapi_clients_digest }}

      - name: Run unit tests
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.directory }}
          target: ${{ inputs.target_unit_test }}
          cache-from: ${{ fromJSON(steps.cache_ref.outputs.cache_refs).test.cache_from }}
          cache-to: ${{ fromJSON(steps.cache_ref.outputs.cache_refs).test.cache_to }}
          build-args: |
            FORMS_SHARED_DIGEST=${{ inputs.forms_shared_digest }}
            OPENAPI_CLIENTS_DIGEST=${{ inputs.openapi_clients_digest }}

      - name: ESLint check
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.directory }}
          target: ${{ inputs.target_lint }}
          cache-from: ${{ fromJSON(steps.cache_ref.outputs.cache_refs).lint.cache_from }}
          cache-to: ${{ fromJSON(steps.cache_ref.outputs.cache_refs).lint.cache_to }}
          build-args: |
            FORMS_SHARED_DIGEST=${{ inputs.forms_shared_digest }}
            OPENAPI_CLIENTS_DIGEST=${{ inputs.openapi_clients_digest }}

      - name: Run E2E tests
        if: ${{ inputs.target_e2e_test != '' }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.directory }}
          target: ${{ inputs.target_e2e_test }}
          cache-from: ${{ fromJSON(steps.cache_ref.outputs.cache_refs)['e2e-test'].cache_from }}
          cache-to: ${{ fromJSON(steps.cache_ref.outputs.cache_refs)['e2e-test'].cache_to }}
          build-args: |
            FORMS_SHARED_DIGEST=${{ inputs.forms_shared_digest }}
            OPENAPI_CLIENTS_DIGEST=${{ inputs.openapi_clients_digest }}
            CI_E2E_DATABASE_URL=postgresql://forms:password@localhost:${{ job.services.postgres.ports[5432] }}/forms?schema=public&connect_timeout=30

      - name: Build
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.directory }}
          target: ${{ inputs.target_build }}
          cache-from: ${{ fromJSON(steps.cache_ref.outputs.cache_refs).build.cache_from }}
          cache-to: ${{ fromJSON(steps.cache_ref.outputs.cache_refs).build.cache_to }}
          build-args: |
            FORMS_SHARED_DIGEST=${{ inputs.forms_shared_digest }}
            OPENAPI_CLIENTS_DIGEST=${{ inputs.openapi_clients_digest }}

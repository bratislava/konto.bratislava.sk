fragment CommonLink on ComponentBlocksCommonLink {
  label
  municipalService {
    title
    ...MunicipalServiceRedirect
  }
  url
}

fragment FooterColumnBlock on ComponentBlocksFooterColumn {
  title
  links {
    ...CommonLink
  }
}

fragment Footer on Footer {
  facebookUrl
  instagramUrl
  youtubeUrl
  linkedinUrl
  tiktokUrl
  columns {
    ...FooterColumnBlock
  }
  accessibilityPageLink {
    ...CommonLink
  }
  contactText
}

query General {
  footer {
    ...Footer
  }
}

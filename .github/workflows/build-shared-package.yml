name: Build Shared Package

on:
  workflow_call:
    inputs:
      directory:
        description: Docker build context directory
        required: false
        type: string
        default: .
      image:
        description: Full image name including registry/repository
        required: true
        type: string
      push:
        description: Whether to push the built image
        required: true
        type: boolean
      target:
        description: Docker build target stage
        required: true
        type: string
    outputs:
      image_digest:
        description: Pushed image digest
        value: ${{ jobs.build.outputs.image_digest }}
    secrets:
      DOCKER_REGISTRY_USERNAME:
        required: true
      DOCKER_REGISTRY_PASSWORD:
        required: true
      HARBOR_REGISTRY_PASSWORD:
        required: true

permissions:
  contents: read

env:
  REGISTRY: harbor.bratislava.sk
  REGISTRY_USERNAME: robot$github_actions

jobs:
  build:
    name: Build Shared Package
    runs-on: bratislava
    outputs:
      image_digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - name: Set up Docker build
        uses: bratislava/github-actions/.github/actions/setup-docker-build@beta
        with:
          docker_registry_username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          docker_registry_password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}
          harbor_registry: ${{ env.REGISTRY }}
          harbor_registry_username: ${{ env.REGISTRY_USERNAME }}
          harbor_registry_password: ${{ secrets.HARBOR_REGISTRY_PASSWORD }}

      - name: Docker metadata
        id: meta
        uses: bratislava/github-actions/.github/actions/docker-metadata@beta
        with:
          image: ${{ inputs.image }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.directory }}
          target: ${{ inputs.target }}
          push: ${{ inputs.push }}
          tags: ${{ inputs.image }}:build-${{ github.sha }}
          cache-from: ${{ steps.meta.outputs.cache_from }}
          cache-to: ${{ steps.meta.outputs.cache_to }}

      - name: Print summary
        shell: bash
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          PUSH: ${{ inputs.push }}
        run: |
          {
            echo "### Build Complete"
            echo "- Digest: \`$DIGEST\`"
            echo "- Pushed: \`$PUSH\`"
          } >> "$GITHUB_STEP_SUMMARY"

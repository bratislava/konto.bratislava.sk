name: Forms Shared Tests
on:
  workflow_call:
    inputs:
      directory:
        description: "Base dir where whole app is located."
        type: string
        required: false
        default: './forms-shared'
      image:
        description: "Full image name including registry/repository for shared Docker cache."
        type: string
        required: true
    secrets:
      DOCKER_REGISTRY_USERNAME:
        required: true
      DOCKER_REGISTRY_PASSWORD:
        required: true
      HARBOR_REGISTRY_PASSWORD:
        required: true

permissions:
  contents: read

env:
  REGISTRY: harbor.bratislava.sk
  REGISTRY_USERNAME: robot$github_actions

jobs:
  test:
    name: Forms Shared Tests
    runs-on: bratislava
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.15"

      - name: Prepare Docker build args
        id: docker-build-args
        shell: bash
        env:
          DIRECTORY: ${{ inputs.directory }}
        run: |
          node "$DIRECTORY/scripts/printDockerBuildArgs.ts" "$DIRECTORY" >> "$GITHUB_OUTPUT"

      - name: Set up Docker build
        uses: bratislava/github-actions/.github/actions/setup-docker-build@beta
        with:
          docker_registry_username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          docker_registry_password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}
          harbor_registry: ${{ env.REGISTRY }}
          harbor_registry_username: ${{ env.REGISTRY_USERNAME }}
          harbor_registry_password: ${{ secrets.HARBOR_REGISTRY_PASSWORD }}

      - name: Docker metadata
        id: meta
        uses: bratislava/github-actions/.github/actions/docker-metadata@beta
        with:
          image: ${{ inputs.image }}
          suffix: -test

      - name: Run tests
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.directory }}
          target: ci-test
          cache-from: ${{ steps.meta.outputs.cache_from }}
          cache-to: ${{ steps.meta.outputs.cache_to }}
          build-args: |
            PLAYWRIGHT_VERSION=${{ steps.docker-build-args.outputs.PLAYWRIGHT_VERSION }}
            SLOVENSKO_MEF_JSON_LAST_MODIFIED=${{ steps.docker-build-args.outputs.SLOVENSKO_MEF_JSON_LAST_MODIFIED }}

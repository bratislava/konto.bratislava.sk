name: Validate forms-shared
on:
  workflow_call:
    inputs:
      directory:
        description: "Base dir where whole app is located."
        type: string
        required: false
        default: './forms-shared'
      image:
        description: "Full image name including registry/repository for shared Docker cache."
        type: string
        required: true
    secrets:
      DOCKER_REGISTRY_USERNAME:
        required: true
      DOCKER_REGISTRY_PASSWORD:
        required: true
      HARBOR_REGISTRY_PASSWORD:
        required: true

env:
  REGISTRY: harbor.bratislava.sk
  REGISTRY_USERNAME: robot$github_actions

jobs:
  test:
    name: Forms-shared tests
    runs-on: bratislava
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Resolve cache refs
        id: cache_ref
        uses: ./.github/actions/resolve-cache-refs
        with:
          image: ${{ inputs.image }}
          suffixes: |
            test

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24.15"

      - name: Prepare Docker build args
        id: docker-build-args
        shell: bash
        run: |
          node "${{ inputs.directory }}/scripts/printDockerBuildArgs.ts" "${{ inputs.directory }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ secrets.HARBOR_REGISTRY_PASSWORD }}

      - name: Run tests
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.directory }}
          target: ci-test
          cache-from: ${{ fromJSON(steps.cache_ref.outputs.cache_refs).test.cache_from }}
          cache-to: ${{ fromJSON(steps.cache_ref.outputs.cache_refs).test.cache_to }}
          build-args: |
            PLAYWRIGHT_VERSION=${{ steps.docker-build-args.outputs.PLAYWRIGHT_VERSION }}
            SLOVENSKO_MEF_JSON_LAST_MODIFIED=${{ steps.docker-build-args.outputs.SLOVENSKO_MEF_JSON_LAST_MODIFIED }}

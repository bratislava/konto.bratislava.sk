name: Build Shared Package

on:
  workflow_call:
    inputs:
      directory:
        description: Docker build context directory
        required: false
        type: string
        default: .
      image:
        description: Full image name including registry/repository
        required: true
        type: string
      push:
        description: Whether to push the built image
        required: true
        type: boolean
      target:
        description: Docker build target stage
        required: true
        type: string
    outputs:
      image_digest:
        description: Pushed image digest
        value: ${{ jobs.build.outputs.image_digest }}
    secrets:
      DOCKER_REGISTRY_USERNAME:
        required: true
      DOCKER_REGISTRY_PASSWORD:
        required: true
      HARBOR_REGISTRY_PASSWORD:
        required: true

env:
  REGISTRY: harbor.bratislava.sk
  REGISTRY_USERNAME: robot$github_actions

jobs:
  build:
    name: Build
    runs-on: bratislava
    outputs:
      image_digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Resolve commit
        id: commit
        shell: bash
        run: |
          echo "tag=${{ inputs.image }}:build-${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Resolve cache refs
        id: cache_ref
        uses: ./.github/actions/resolve-cache-refs
        with:
          image: ${{ inputs.image }}
          suffixes: |
            build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ secrets.HARBOR_REGISTRY_PASSWORD }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.directory }}
          target: ${{ inputs.target }}
          push: ${{ inputs.push }}
          tags: ${{ steps.commit.outputs.tag }}
          cache-from: ${{ fromJSON(steps.cache_ref.outputs.cache_refs).build.cache_from }}
          cache-to: ${{ fromJSON(steps.cache_ref.outputs.cache_refs).build.cache_to }}

      - name: Print summary
        shell: bash
        run: |
          echo "### Build Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "- Digest: \`${{ steps.build.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Pushed: \`${{ inputs.push }}\`" >> "$GITHUB_STEP_SUMMARY"

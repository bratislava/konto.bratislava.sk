name: Build Strapi
on:
  workflow_call:
    inputs:
      directory:
        description: "Base dir where whole app is located."
        type: string
        required: true
      image:
        description: "Full image name including registry/repository for Docker cache."
        type: string
        required: true
      build_target:
        description: "Docker target used for final image build."
        type: string
        required: false
        default: prod
    secrets:
      DOCKER_REGISTRY_USERNAME:
        required: true
      DOCKER_REGISTRY_PASSWORD:
        required: true
      HARBOR_REGISTRY_PASSWORD:
        required: true

permissions:
  contents: read

env:
  REGISTRY: harbor.bratislava.sk
  REGISTRY_USERNAME: robot$github_actions

jobs:
  build:
    name: Build Strapi
    runs-on: "bratislava"
    defaults:
      run:
        working-directory: ${{ inputs.directory }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Resolve cache refs
        id: cache_ref
        uses: ./.github/actions/resolve-cache-refs
        with:
          image: ${{ inputs.image }}
          suffixes: |
            build

      - name: Pipelines Version
        run: |
          echo "Pipelines version: 2.3.0"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ secrets.HARBOR_REGISTRY_PASSWORD }}

      - name: Build
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.directory }}
          target: ${{ inputs.build_target }}
          cache-from: ${{ fromJSON(steps.cache_ref.outputs.cache_refs).build.cache_from }}
          cache-to: ${{ fromJSON(steps.cache_ref.outputs.cache_refs).build.cache_to }}

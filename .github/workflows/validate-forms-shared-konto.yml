name: Validate forms-shared
on:
  workflow_call:
    inputs:
      directory:
        description: "Base dir where whole app is located."
        type: string
        required: false
        default: './forms-shared'
      image:
        description: "Full image name including registry/repository for shared Docker cache."
        type: string
        required: true
    secrets:
      HARBOR_REGISTRY_PASSWORD:
        required: true

env:
  REGISTRY: harbor.bratislava.sk
  REGISTRY_USERNAME: robot$github_actions

jobs:
  test:
    name: Forms-shared tests
    runs-on: bratislava
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Pipelines Version
        run: |
          echo "Pipelines version: 2.3.0"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.14

      - name: Prepare Docker build args
        id: docker-build-args
        shell: bash
        run: |
          node "${{ inputs.directory }}/scripts/printDockerBuildArgs.ts" "${{ inputs.directory }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ secrets.HARBOR_REGISTRY_PASSWORD }}

      - name: Build Docker image on test target with shared cache
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.directory }}
          target: test
          load: true
          tags: forms-shared-test:${{ github.sha }}
          cache-from: type=registry,ref=${{ inputs.image }}:cache
          cache-to: type=registry,ref=${{ inputs.image }}:cache,mode=max
          build-args: |
            PLAYWRIGHT_VERSION=${{ steps.docker-build-args.outputs.PLAYWRIGHT_VERSION }}
            SLOVENSKO_MEF_JSON_LAST_MODIFIED=${{ steps.docker-build-args.outputs.SLOVENSKO_MEF_JSON_LAST_MODIFIED }}

      - name: Run tests
        run: |
          docker run forms-shared-test:${{ github.sha }}

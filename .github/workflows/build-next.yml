name: Build Next
# Two modes, selected by the `cluster` input:
#   - CI (cluster == ''): build the final image, do not push.
#   - Deploy (cluster != ''): reuse an existing commit image or build+push it
#     and re-tag it for the cluster. The infrastructure deploy is triggered
#     separately by the caller (deploy.yml).
#
# Next.js bakes the environment into the build, so the image, tags and Docker
# cache are environment-specific (the `-<build_env>` flavor suffix) and cannot
# be reused across clusters.
on:
  workflow_call:
    inputs:
      image:
        description: "Full image name including registry/repository for Docker cache."
        type: string
        required: true
      build_env:
        description: "Environment suffix for .env.bratiska-cli-build.<env> (dev, staging, prod)."
        type: string
        required: true
      cluster:
        description: >-
          Target cluster (development, staging, production). Empty = CI build
          only (no push). When set, the image is built/pushed and re-tagged for
          the cluster, ready for the caller to trigger the infrastructure deploy.
        type: string
        required: false
        default: ""
    secrets:
      DOCKER_REGISTRY_USERNAME:
        required: true
      DOCKER_REGISTRY_PASSWORD:
        required: true
      HARBOR_REGISTRY_PASSWORD:
        required: true
      TURBOREPO_CACHE_MINIO_SECRET_KEY:
        required: true

permissions:
  contents: read

env:
  REGISTRY: harbor.bratislava.sk
  REGISTRY_USERNAME: robot$github_actions

jobs:
  build:
    name: Build Next
    runs-on: bratislava
    env:
      # Per-cluster deploy tag prefix (empty in CI) and the per-environment
      # flavor suffix that keeps each env's image and cache separate.
      CLUSTER_PREFIX: ${{ inputs.cluster != '' && format('{0}-', inputs.cluster) || '' }}
      ENV_SUFFIX: -${{ inputs.build_env }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1

      - name: Resolve short SHA
        id: sha
        run: echo "short_sha=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Prepare Next.js build env
        shell: bash
        run: |
          # Mimic bratiska-cli build_image behavior by promoting the
          # bratiska-cli build env file to .env.production.local
          # before docker build starts.
          cd next
          case "${{ inputs.build_env }}" in
            dev|staging|prod)
              ;;
            *)
              echo "::error::Unsupported build_env '${{ inputs.build_env }}'. Allowed values: dev, staging, prod."
              exit 1
              ;;
          esac

          source_env_file=".env.bratiska-cli-build.${{ inputs.build_env }}"
          if [[ ! -f "$source_env_file" ]]; then
            echo "::error file=$source_env_file::Missing $source_env_file in $PWD"
            exit 1
          fi
          cp "$source_env_file" .env.production.local

      - name: Set up Docker build
        uses: bratislava/github-actions/.github/actions/setup-docker-build@beta
        with:
          docker_registry_username: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
          docker_registry_password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}
          harbor_registry: ${{ env.REGISTRY }}
          harbor_registry_username: ${{ env.REGISTRY_USERNAME }}
          harbor_registry_password: ${{ secrets.HARBOR_REGISTRY_PASSWORD }}

      - name: Docker metadata
        id: meta
        uses: bratislava/github-actions/.github/actions/docker-metadata@beta
        with:
          image: ${{ inputs.image }}
          prefix: ${{ env.CLUSTER_PREFIX }}
          suffix: ${{ env.ENV_SUFFIX }}

      # Deploy mode only: reuse the per-env commit image across clusters. If it
      # already exists, re-tag it for this cluster and skip the build below.
      - name: Check for existing image
        if: ${{ inputs.cluster != '' }}
        id: existing
        uses: bratislava/github-actions/.github/actions/check-existing-image@beta
        with:
          existing_tag: ${{ inputs.image }}:${{ steps.sha.outputs.short_sha }}${{ env.ENV_SUFFIX }}
          new_tag: ${{ inputs.image }}:${{ env.CLUSTER_PREFIX }}${{ steps.sha.outputs.short_sha }}${{ env.ENV_SUFFIX }}

      - name: Start Turborepo Cache Server
        uses: brunojppb/turbo-cache-server@4.0.9
        env:
          PORT: "8585"
          S3_BUCKET_NAME: "city-account-turborepo-cache"
          S3_ACCESS_KEY: "city-account-turborepo-cache"
          S3_SECRET_KEY: ${{ secrets.TURBOREPO_CACHE_MINIO_SECRET_KEY }}

          # The missing MinIO details:
          S3_ENDPOINT: "https://s3.bratislava.sk"
          S3_REGION: "us-east-1" # Usually safe to leave as us-east-1 for MinIO

          # CRITICAL FOR MINIO: Forces the server to use domain.com/bucket
          # instead of bucket.domain.com
          S3_USE_PATH_STYLE: "true"

      - name: Debug Turbo cache reachability
        shell: bash
        run: |
          set -euxo pipefail
          curl -v http://127.0.0.1:8585/management/health

          docker run --rm --network host curlimages/curl:8.11.1 \
            -v http://127.0.0.1:8585/management/health || true

          docker run --rm --add-host=host.docker.internal:host-gateway curlimages/curl:8.11.1 \
            -v http://host.docker.internal:8585/management/health || true

      - name: Build image
        if: ${{ inputs.cluster == '' || steps.existing.outputs.found != 'true' }}
        uses: docker/build-push-action@v7
        with:
          file: ./next/Dockerfile
          target: runner
          push: ${{ inputs.cluster != '' }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: ${{ steps.meta.outputs.cache_from }}
          cache-to: ${{ steps.meta.outputs.cache_to }}
          network: host
          build-args: |
            TURBO_API=http://host.docker.internal:8585
            TURBO_TEAM=city-account
            TURBO_TOKEN=local
